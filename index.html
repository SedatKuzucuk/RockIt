<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RockIt! - Evolved</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --yellow: #F5FF4F;
  --orange: #FF4F0D;
  --green: #0DFFB0;
  --white: #F0EDE4;
  --black: #0A0A0A;
  --gray: #1A1A1A;
  --gray2: #2A2A2A;
  --blue: #00D1FF;
  --purple: #B026FF;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Mono', monospace;
  background: var(--black);
  min-height: 100vh;
  color: var(--white);
  overflow: hidden;
}

/* UI ELEMENTS */
#top-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  z-index: 100;
  pointer-events: none;
}

.stat-box {
  background: rgba(26, 26, 26, 0.8);
  border: 1px solid var(--gray3);
  padding: 10px 15px;
  font-family: 'Bebas Neue';
  font-size: 20px;
  color: var(--yellow);
  pointer-events: auto;
}

/* CHARACTER GRID REVAMP */
.char-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 15px;
  padding: 20px;
  max-width: 800px;
  margin: 0 auto;
}

.char-card {
  background: var(--gray);
  border: 2px solid var(--gray2);
  padding: 15px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
}

.char-card.locked {
  opacity: 0.5;
  filter: grayscale(1);
}

.char-card.selected {
  border-color: var(--yellow);
  transform: translateY(-5px);
  box-shadow: 0 5px 15px rgba(245, 255, 79, 0.2);
}

.char-emoji { font-size: 40px; display: block; margin-bottom: 10px; }
.char-name { font-family: 'Bebas Neue'; font-size: 24px; display: block; }
.char-level { font-size: 12px; color: var(--green); }
.char-price { font-size: 14px; color: var(--orange); font-weight: bold; }

/* SCREEN MANAGEMENT */
.screen {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: var(--black);
}

.screen.active { display: flex; }

.btn {
  font-family: 'Bebas Neue';
  padding: 15px 40px;
  font-size: 24px;
  border: none;
  cursor: pointer;
  margin-top: 20px;
  transition: transform 0.2s;
}

.btn-yellow { background: var(--yellow); color: var(--black); }
.btn-yellow:hover { transform: scale(1.05); }

/* GAMEPLAY UI */
#game-arena {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 40px;
}

.choice-container {
  display: flex;
  gap: 20px;
}

.choice-btn {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 2px solid var(--white);
  background: transparent;
  color: var(--white);
  font-size: 30px;
  cursor: pointer;
}

.choice-btn:hover { background: var(--white); color: var(--black); }

</style>
</head>
<body>

<div id="top-bar">
    <div class="stat-box">💰 <span id="gold-display">0</span></div>
    <div id="mute-btn" class="stat-box" onclick="toggleMute()">🔊 SES</div>
</div>

<div id="screen-lobby" class="screen active">
    <h1 style="font-family:'Bebas Neue'; font-size: 80px; color: var(--yellow);">ROCKIT!</h1>
    <p style="margin-bottom: 30px;">AVATARINI SEÇ VE SAVAŞA BAŞLA</p>
    
    <div class="char-grid" id="char-list">
        </div>

    <button class="btn btn-yellow" onclick="startBattle()">SAVAŞA GİR →</button>
</div>

<div id="screen-game" class="screen">
    <div id="game-arena">
        <div id="opponent-side" style="text-align: center;">
            <div id="opp-emoji" style="font-size: 60px;">🤖</div>
            <p>BOT PROFESSOR</p>
        </div>

        <div id="result-text" style="font-family:'Bebas Neue'; font-size: 40px; min-height: 50px;">HAZIR MISIN?</div>

        <div id="player-side" style="text-align: center;">
            <div id="player-emoji" style="font-size: 60px;">🐼</div>
            <p id="player-name-tag">PANDA (LVL 1)</p>
            <div class="choice-container" style="margin-top: 20px;">
                <button class="choice-btn" onclick="playTurn('ROCK')">✊</button>
                <button class="choice-btn" onclick="playTurn('PAPER')">✋</button>
                <button class="choice-btn" onclick="playTurn('SCISSORS')">✌️</button>
            </div>
        </div>
    </div>
</div>

<script>
// --- GAME DATA & STATE ---
const CHARACTERS = [
    { id: 'PANDA', name: 'Panda', emoji: '🐼', price: 0, type: 'Balanced' },
    { id: 'SAMURAI', name: 'Samurai', emoji: '🥷', price: 500, type: 'Speed' },
    { id: 'ROBOT', name: 'Robot', emoji: '🤖', price: 1250, type: 'Intel' },
    { id: 'PHANTOM', name: 'Phantom', emoji: '👻', price: 2500, type: 'Stealth' },
    { id: 'DRAGON', name: 'Dragon', emoji: '🐲', price: 5000, type: 'Power' }
];

let gameState = {
    gold: parseInt(localStorage.getItem('rockit_gold')) || 0,
    unlocked: JSON.parse(localStorage.getItem('rockit_unlocked')) || ['PANDA'],
    levels: JSON.parse(localStorage.getItem('rockit_levels')) || { PANDA:1, SAMURAI:1, ROBOT:1, PHANTOM:1, DRAGON:1 },
    xp: JSON.parse(localStorage.getItem('rockit_xp')) || { PANDA:0, SAMURAI:0, ROBOT:0, PHANTOM:0, DRAGON:0 },
    selectedChar: 'PANDA'
};

// --- CORE FUNCTIONS ---
function initLobby() {
    const list = document.getElementById('char-list');
    list.innerHTML = '';
    document.getElementById('gold-display').textContent = gameState.gold;

    CHARACTERS.forEach(char => {
        const isUnlocked = gameState.unlocked.includes(char.id);
        const card = document.createElement('div');
        card.className = `char-card ${!isUnlocked ? 'locked' : ''} ${gameState.selectedChar === char.id ? 'selected' : ''}`;
        
        card.innerHTML = `
            <span class="char-emoji">${char.emoji}</span>
            <span class="char-name">${char.name}</span>
            <span class="char-level">LVL ${gameState.levels[char.id]}</span>
            ${!isUnlocked ? `<span class="char-price">💰 ${char.price}</span>` : ''}
        `;

        card.onclick = () => selectCharacter(char);
        list.appendChild(card);
    });
}

function selectCharacter(char) {
    if (gameState.unlocked.includes(char.id)) {
        gameState.selectedChar = char.id;
    } else {
        if (gameState.gold >= char.price) {
            if (confirm(`${char.name} karakterini ${char.price} altına açmak istiyor musun?`)) {
                gameState.gold -= char.price;
                gameState.unlocked.push(char.id);
                gameState.selectedChar = char.id;
            }
        } else {
            alert('Yeterli altının yok! Savaşarak kazanabilirsin.');
        }
    }
    saveData();
    initLobby();
}

function playTurn(playerChoice) {
    const choices = ['ROCK', 'PAPER', 'SCISSORS'];
    const botChoice = choices[Math.floor(Math.random() * 3)];
    const emojis = { ROCK: '✊', PAPER: '✋', SCISSORS: '✌️' };
    
    document.getElementById('result-text').textContent = `${emojis[playerChoice]} VS ${emojis[botChoice]}`;

    if (playerChoice === botChoice) {
        handleResult('DRAW');
    } else if (
        (playerChoice === 'ROCK' && botChoice === 'SCISSORS') ||
        (playerChoice === 'PAPER' && botChoice === 'ROCK') ||
        (playerChoice === 'SCISSORS' && botChoice === 'PAPER')
    ) {
        handleResult('WIN');
    } else {
        handleResult('LOSE');
    }
}

function handleResult(res) {
    const status = document.getElementById('result-text');
    if (res === 'WIN') {
        status.style.color = 'var(--green)';
        status.textContent = "TEBRİKLER! +15 ALTIN";
        gameState.gold += 15;
        gainXP(gameState.selectedChar, 25);
    } else if (res === 'LOSE') {
        status.style.color = 'var(--orange)';
        status.textContent = "KAYBETTİN!";
        gainXP(gameState.selectedChar, 5);
    } else {
        status.style.color = 'var(--white)';
        status.textContent = "BERABERE!";
    }
    saveData();
    document.getElementById('gold-display').textContent = gameState.gold;
    
    setTimeout(() => {
        if(confirm("Tekrar oynamak ister misin yoksa lobiye mi döneceksin?")) {
            status.textContent = "HAZIR MISIN?";
        } else {
            showScreen('screen-lobby');
        }
    }, 1500);
}

function gainXP(charId, amount) {
    gameState.xp[charId] += amount;
    const nextLevelAt = gameState.levels[charId] * 100;
    if (gameState.xp[charId] >= nextLevelAt) {
        gameState.levels[charId]++;
        gameState.xp[charId] = 0;
        alert(`LEVEL UP! ${charId} artık Level ${gameState.levels[charId]}`);
    }
}

function saveData() {
    localStorage.setItem('rockit_gold', gameState.gold);
    localStorage.setItem('rockit_unlocked', JSON.stringify(gameState.unlocked));
    localStorage.setItem('rockit_levels', JSON.stringify(gameState.levels));
    localStorage.setItem('rockit_xp', JSON.stringify(gameState.xp));
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 'screen-lobby') initLobby();
}

function startBattle() {
    const char = CHARACTERS.find(c => c.id === gameState.selectedChar);
    document.getElementById('player-emoji').textContent = char.emoji;
    document.getElementById('player-name-tag').textContent = `${char.name} (LVL ${gameState.levels[char.id]})`;
    showScreen('screen-game');
}

// Start
initLobby();
</script>
</body>
</html>
